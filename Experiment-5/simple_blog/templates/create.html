{% extends 'base.html' %}

{% block title %}Create Post | Simple Blog{% endblock %}

{% block content %}
  <section class="card form-card">
    <p class="eyebrow">New Post</p>
    <h2>Create Blog Post</h2>
    <form method="post" class="blog-form">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" placeholder="Enter post title" required />

      <label for="content">Content</label>
      <textarea id="content" name="content" rows="8" placeholder="Write your post here" required></textarea>

      <button type="submit" class="button">Publish Post</button>
    </form>
  </section>
{% endblock %}

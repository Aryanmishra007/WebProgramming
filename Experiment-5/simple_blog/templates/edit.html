{% extends 'base.html' %}

{% block title %}Edit Post | Simple Blog{% endblock %}

{% block content %}
  <section class="card form-card">
    <p class="eyebrow">Edit Post</p>
    <h2>Edit Blog Post</h2>
    <form method="post" class="blog-form">
      <label for="title">Title</label>
      <input type="text" id="title" name="title" value="{{ post.title }}" required />

      <label for="content">Content</label>
      <textarea id="content" name="content" rows="8" required>{{ post.content }}</textarea>

      <div class="form-actions">
        <button type="submit" class="button">Save Changes</button>
        <a class="button secondary" href="{{ url_for('index') }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
